<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Register</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">

<link rel="stylesheet" href="styles.css">
</head>

<body class="d-flex justify-content-center align-items-center vh-100">

<div class="card p-4 shadow-lg form-card">
    <h3 class="text-center mb-3">Register</h3>

    <form action="index.html">
        <input type="text" class="form-control mb-3" placeholder="Full Name" required>
        <input type="email" class="form-control mb-3" placeholder="Email" required>
        <input type="text" class="form-control mb-3" placeholder="Username" required>
        <input type="password" class="form-control mb-3" placeholder="Password" required>

        <button class="btn btn-success w-100">Register</button>
    </form>

    <div class="text-center mt-3">
        <a href="index.html">Already have account? Login</a>
    </div>
</div>

</body>
</html>
